<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寄信 — 把说不出口的话，藏进一个二维码里</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf6f0;
    --ink: #3d322b;
    --ink-light: #8b7a6b;
    --accent: #c44536;
    --accent-soft: #e8a598;
    --gold: #b8956a;
    --bg: #f5f0e8;
    --card: #fffef9;
    --border: #e0d5c7;
    --shadow: 0 2px 24px rgba(60,40,20,0.08);
    --font-serif: 'Noto Serif SC', 'Georgia', 'STSong', 'SimSun', serif;
    --font-display: 'Playfair Display', 'Noto Serif SC', serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-art: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    background-image:
      url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E"),
      radial-gradient(ellipse at 50% 0%, rgba(180,150,120,0.08) 0%, transparent 70%);
  }

  .app-container {
    width: 100%;
    max-width: 540px;
    position: relative;
  }

  /* ============ HEADER ============ */
  .app-header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeInDown 0.8s ease;
  }
  .app-header .envelope-icon {
    font-size: 42px;
    display: block;
    margin-bottom: 12px;
    animation: float 3s ease-in-out infinite;
  }
  .app-header h1 {
    font-family: var(--font-art);
    font-size: 36px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 6px;
    margin-bottom: 8px;
  }
  .app-header .sub {
    font-family: var(--font-serif);
    font-size: 14px;
    color: var(--ink-light);
    letter-spacing: 1.5px;
    font-weight: 300;
  }
  .app-header .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 14px auto 0;
  }

  /* ============ WRITE MODE ============ */
  .write-mode { display: block; animation: fadeIn 0.6s ease; }
  .read-mode { display: none; }

  .paper {
    background: var(--card);
    border-radius: 2px;
    padding: 44px 40px 36px;
    box-shadow: var(--shadow);
    position: relative;
    border-top: 4px solid var(--accent);
    animation: slideUp 0.6s ease;
  }
  .paper::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 48px 48px 0;
    border-color: transparent var(--border) transparent transparent;
  }
  .paper::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 44px 44px 0;
    border-color: transparent var(--card) transparent transparent;
  }

  .field-group {
    margin-bottom: 22px;
    position: relative;
  }
  .field-group label {
    display: block;
    font-family: var(--font-serif);
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 2px;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .field-group label .optional {
    font-weight: 300;
    opacity: 0.6;
  }
  .field-group input,
  .field-group textarea {
    width: 100%;
    border: none;
    border-bottom: 1px solid var(--border);
    background: transparent;
    font-family: var(--font-serif);
    font-size: 16px;
    color: var(--ink);
    padding: 6px 2px;
    outline: none;
    transition: border-color 0.3s, padding-left 0.3s;
    line-height: 1.9;
    position: relative;
    z-index: 1;
  }
  .field-group input:focus,
  .field-group textarea:focus {
    border-bottom-color: var(--accent);
    padding-left: 4px;
  }
  .field-group textarea {
    resize: none;
    min-height: 120px;
    line-height: 32px;
    overflow: hidden;
    transition: height 0.2s ease;
  }
  .field-group input::placeholder,
  .field-group textarea::placeholder {
    color: #c8c0b4;
    font-style: italic;
    font-weight: 300;
  }

  .char-hint {
    font-size: 11px;
    color: var(--ink-light);
    text-align: right;
    margin-top: 6px;
    letter-spacing: 0.5px;
    font-family: var(--font-sans);
  }

  /* Theme selector */
  .theme-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 8px 0 24px;
  }
  .theme-label {
    font-family: var(--font-serif);
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 2px;
  }
  .theme-dots {
    display: flex;
    gap: 8px;
  }
  .theme-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.25s ease;
    position: relative;
  }
  .theme-dot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1.5px solid transparent;
    transition: border-color 0.25s;
  }
  .theme-dot.active::after { border-color: var(--ink); }
  .theme-dot:hover { transform: scale(1.1); }
  .theme-dot.warm { background: #faf6f0; }
  .theme-dot.cool { background: #f2f6fa; }
  .theme-dot.pink { background: #faf4f6; }
  .theme-dot.mint { background: #f4faf6; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 32px;
    border-radius: 2px;
    font-size: 15px;
    font-family: var(--font-serif);
    cursor: pointer;
    border: none;
    transition: all 0.25s ease;
    letter-spacing: 1px;
    font-weight: 500;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transition: left 0.5s ease;
  }
  .btn-primary:hover::after { left: 100%; }
  .btn-primary:hover { background: #2a2018; transform: translateY(-1px); }
  .btn-primary:disabled {
    background: #ccc5bb;
    cursor: not-allowed;
    transform: none;
  }
  .btn-primary:disabled::after { display: none; }
  .btn-primary.loading::after { display: none; }
  .btn-primary.loading {
    background: #ccc5bb;
    cursor: wait;
  }

  .btn-outline {
    background: transparent;
    color: var(--ink-light);
    border: 1px solid var(--border);
    font-size: 13px;
    padding: 10px 20px;
  }
  .btn-outline:hover {
    border-color: var(--ink);
    color: var(--ink);
    background: rgba(0,0,0,0.02);
  }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  /* ============ RESULT SECTION ============ */
  .result-section {
    display: none;
    margin-top: 28px;
    animation: fadeInUp 0.6s ease;
  }
  .result-section.show { display: block; }

  .result-header {
    text-align: center;
    margin-bottom: 20px;
  }
  .result-header h2 {
    font-family: var(--font-art);
    font-size: 20px;
    color: var(--ink);
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  .result-header p {
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 1px;
  }

  .qr-display {
    background: var(--card);
    border-radius: 2px;
    padding: 36px;
    box-shadow: var(--shadow);
    text-align: center;
    position: relative;
    border: 1px solid var(--border);
  }
  .qr-display .qr-frame {
    display: inline-block;
    padding: 16px;
    background: #fff;
    border: 1px solid var(--border);
    position: relative;
  }
  .qr-display .qr-frame::before {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border: 1px dashed var(--border);
    pointer-events: none;
  }
  .qr-display .qr-frame canvas,
  .qr-display .qr-frame img {
    display: block;
  }
  .qr-display .qr-label {
    font-family: var(--font-serif);
    font-size: 13px;
    color: var(--ink);
    margin-top: 16px;
    letter-spacing: 1px;
  }
  .qr-display .qr-hint {
    font-size: 11px;
    color: var(--ink-light);
    margin-top: 4px;
  }

  /* ============ READ MODE ============ */
  .read-mode .letter-stage {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.6s ease;
  }

  .letter-paper {
    background: var(--card);
    border-radius: 2px;
    padding: 56px 44px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 500px;
    position: relative;
    animation: paperAppear 0.8s ease;
  }
  .letter-paper::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--accent);
  }

  .letter-paper .letter-meta {
    font-family: var(--font-display);
    font-size: 11px;
    color: var(--ink-light);
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .letter-paper .letter-title {
    font-family: var(--font-art);
    font-size: 24px;
    color: var(--ink);
    text-align: center;
    margin-bottom: 36px;
    letter-spacing: 4px;
  }

  .letter-paper .letter-body {
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 32px;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 60px;
  }

  .letter-paper .letter-body .cursor {
    display: inline-block;
    width: 2px;
    height: 18px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s infinite;
  }

  .letter-paper .letter-close {
    text-align: right;
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .letter-paper .letter-close.show { opacity: 1; }

  .letter-paper .letter-signature {
    font-family: var(--font-art);
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .letter-paper .letter-date {
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 1px;
  }

  .read-footer {
    text-align: center;
    margin-top: 36px;
    opacity: 0;
    animation: fadeIn 1s ease 2s forwards;
  }
  .read-footer .hint {
    font-size: 12px;
    color: var(--ink-light);
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  /* ============ PRINT OVERLAY ============ */
  .print-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .print-overlay.show {
    display: flex;
  }

  .print-card {
    background: #fff;
    width: 360px;
    padding: 32px;
    border-radius: 3px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
    position: relative;
    border: 1px solid #d0c8bc;
  }
  .print-card .print-header {
    font-family: var(--font-art);
    font-size: 18px;
    color: #3d322b;
    margin-bottom: 4px;
    letter-spacing: 3px;
  }
  .print-card .print-sub {
    font-family: var(--font-serif);
    font-size: 11px;
    color: #8b7a6b;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .print-card .print-qr {
    display: inline-block;
    padding: 12px;
    border: 1px solid #d0c8bc;
    margin-bottom: 16px;
  }
  .print-card .print-footer {
    font-size: 10px;
    color: #a09080;
    letter-spacing: 0.5px;
    word-break: break-all;
  }
  .print-card .print-close {
    position: absolute;
    top: 8px; right: 12px;
    font-size: 20px;
    color: #8b7a6b;
    cursor: pointer;
    border: none;
    background: none;
    line-height: 1;
  }
  .print-card .print-close:hover { color: #3d322b; }

  .print-actions-overlay {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: center;
  }

  /* ============ ANIMATIONS ============ */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes paperAppear {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* ============ PRINT STYLES ============ */
  @media print {
    body { background: #fff; padding: 0; }
    .app-header,
    .write-mode,
    .read-mode,
    .read-footer,
    .print-actions-overlay,
    .print-close,
    .error-state {
      display: none !important;
    }
    .print-overlay {
      display: flex !important;
      position: static;
      background: none;
      padding: 0;
      justify-content: flex-start;
      align-items: flex-start;
    }
    .print-card {
      box-shadow: none;
      border: 1px solid #ccc;
      margin: 0 auto;
      page-break-inside: avoid;
    }
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 480px) {
    body { padding: 20px 16px; }
    .app-header h1 { font-size: 28px; letter-spacing: 4px; }
    .paper { padding: 28px 24px 24px; }
    .letter-paper { padding: 36px 28px; }
    .letter-paper .letter-title { font-size: 20px; }
    .letter-paper .letter-body { font-size: 15px; line-height: 30px; }
    .print-card { width: 100%; max-width: 340px; }
  }

  /* Error state */
  .error-state {
    text-align: center;
    padding: 80px 20px;
    animation: fadeIn 0.6s ease;
  }
  .error-state .icon { font-size: 52px; margin-bottom: 20px; }
  .error-state h2 {
    font-family: var(--font-art);
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }
  .error-state p { font-size: 13px; color: var(--ink-light); }
  .error-state .back-btn { margin-top: 24px; display: inline-block; }
</style>
</head>
<body>
<div class="app-container">
  <!-- ============ WRITE MODE ============ -->
  <div class="write-mode" id="writeMode">
    <div class="app-header">
      <span class="envelope-icon">✉️</span>
      <h1>寄 信</h1>
      <div class="sub">把说不出口的话，藏进一个二维码里</div>
      <div class="divider"></div>
    </div>

    <div class="paper" id="paperEl">
      <div class="field-group">
        <label>致 <span class="optional">（收信人，可选）</span></label>
        <input type="text" id="letterTo" placeholder="对方的名字" maxlength="50">
      </div>
      <div class="field-group">
        <label>信 <span class="optional">（正文）</span></label>
        <textarea id="letterBody" placeholder="在这里写下你想说的话..." maxlength="3000"></textarea>
        <div class="char-hint">建议 800 字以内</div>
      </div>
      <div class="field-group">
        <label>署名 <span class="optional">（你的名字，可选）</span></label>
        <input type="text" id="letterFrom" placeholder="你的名字" maxlength="50">
      </div>

      <div class="theme-row">
        <span class="theme-label">信纸</span>
        <div class="theme-dots">
          <div class="theme-dot warm active" data-theme="warm" title="暖光"></div>
          <div class="theme-dot cool" data-theme="cool" title="静谧蓝"></div>
          <div class="theme-dot pink" data-theme="pink" title="樱花粉"></div>
          <div class="theme-dot mint" data-theme="mint" title="薄荷绿"></div>
        </div>
      </div>

      <button class="btn btn-primary" id="btnGenerate" disabled>
        生成我的信
      </button>
    </div>

    <!-- Result Section (hidden until generation) -->
    <div class="result-section" id="resultSection">
      <div class="result-header">
        <h2>信已备好</h2>
        <p>将下方二维码保存或打印，送给对方</p>
      </div>

      <div class="qr-display" id="qrDisplay">
        <div class="qr-frame" id="qrFrame"></div>
        <div class="qr-label" id="qrLabel">致 · 亲爱的朋友</div>
        <div class="qr-hint">扫一扫，信会自己展开</div>
      </div>

      <div class="action-row">
        <button class="btn btn-outline" onclick="openPrintOverlay()" style="flex:1">
          打印卡片
        </button>
        <button class="btn btn-outline" id="btnCopyLink" style="flex:1">
          复制链接
        </button>
        <button class="btn btn-outline" id="btnNewLetter" style="flex:1">
          再写一封
        </button>
      </div>
    </div>
  </div>

  <!-- ============ READ MODE ============ -->
  <div class="read-mode" id="readMode">
    <div class="letter-stage">
      <div class="letter-paper" id="letterPaper">
        <div class="letter-meta" id="letterMeta">A HIDDEN LETTER</div>
        <div class="letter-title" id="letterTitle"></div>
        <div class="letter-body" id="letterBodyDisplay"></div>
        <div class="letter-close" id="letterClose">
          <div class="letter-signature" id="letterSignature"></div>
          <div class="letter-date" id="letterDate"></div>
        </div>
      </div>
    </div>
    <div class="read-footer">
      <div class="hint">这也是一封用「寄信」发送的隐藏信件</div>
      <button class="btn btn-outline" onclick="location.hash=''">
        我也要写一封
      </button>
    </div>
  </div>

  <!-- Error state -->
  <div class="error-state" id="errorState" style="display:none;">
    <div class="icon">📭</div>
    <h2>这封信好像不见了</h2>
    <p>链接可能已过期或被损坏</p>
    <button class="btn btn-outline back-btn" onclick="location.hash=''">
      ← 回到首页
    </button>
  </div>

  <!-- ============ PRINT OVERLAY ============ -->
  <div class="print-overlay" id="printOverlay">
    <div class="print-card" id="printCard">
      <button class="print-close" onclick="closePrintOverlay()">&times;</button>
      <div class="print-header" id="printHeader">致 · 亲爱的朋友</div>
      <div class="print-sub">扫描阅读这封隐藏的信</div>
      <div class="print-qr" id="printQr"></div>
      <div class="print-footer" id="printFooter"></div>
      <div class="print-actions-overlay">
        <button class="btn btn-primary" onclick="doPrint()" style="flex:1">
          确认打印
        </button>
        <button class="btn btn-outline" onclick="closePrintOverlay()" style="flex:1">
          取消
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ============ CONFIG ============
// REPLACE THIS with your Cloudflare Worker URL after deployment
const API_BASE = 'https://letter-api.YOUR_SUBDOMAIN.workers.dev';
// Example: 'https://letter-api.useralex110.workers.dev'

// ============ THEMES ============
const themes = {
  warm:  { card: '#fffef9', bg: '#f5f0e8', accent: '#c44536', ink: '#3d322b', border: '#e0d5c7' },
  cool:  { card: '#fafcfe', bg: '#f0f4f8', accent: '#4a7c96', ink: '#2c3e4f', border: '#d0dae4' },
  pink:  { card: '#fffafa', bg: '#f8f0f2', accent: '#c4657a', ink: '#4a2c34', border: '#e8d4da' },
  mint:  { card: '#fafffb', bg: '#f0f6f2', accent: '#5a8a72', ink: '#2c3e34', border: '#d0e4d8' }
};

let currentTheme = 'warm';
let currentToken = '';
let currentLetterData = null;

// ============ DOM ============
const writeMode = document.getElementById('writeMode');
const readMode = document.getElementById('readMode');
const errorState = document.getElementById('errorState');
const paperEl = document.getElementById('paperEl');
const letterBody = document.getElementById('letterBody');
const letterTo = document.getElementById('letterTo');
const letterFrom = document.getElementById('letterFrom');
const btnGenerate = document.getElementById('btnGenerate');
const resultSection = document.getElementById('resultSection');
const qrFrame = document.getElementById('qrFrame');
const qrLabel = document.getElementById('qrLabel');
const qrDisplay = document.getElementById('qrDisplay');
const printOverlay = document.getElementById('printOverlay');
const printHeader = document.getElementById('printHeader');
const printQr = document.getElementById('printQr');
const printFooter = document.getElementById('printFooter');
const printCard = document.getElementById('printCard');

// ============ THEME SWITCHING ============
document.querySelectorAll('.theme-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    currentTheme = dot.dataset.theme;
    applyTheme(currentTheme);
  });
});

function applyTheme(themeName) {
  const t = themes[themeName];
  document.documentElement.style.setProperty('--card', t.card);
  document.documentElement.style.setProperty('--bg', t.bg);
  document.documentElement.style.setProperty('--accent', t.accent);
  document.documentElement.style.setProperty('--ink', t.ink);
  document.documentElement.style.setProperty('--border', t.border);
}

// ============ VALIDATION & AUTO-RESIZE ============
function checkValid() {
  btnGenerate.disabled = letterBody.value.trim().length === 0;
}

function autoResize() {
  letterBody.style.height = 'auto';
  letterBody.style.height = letterBody.scrollHeight + 'px';
}

letterBody.addEventListener('input', () => {
  checkValid();
  autoResize();
});

// Initial resize in case of pre-filled content
autoResize();

// ============ GENERATE LETTER ============
btnGenerate.addEventListener('click', async () => {
  const btn = btnGenerate;
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '正在寄出...';

  const letter = {
    to: letterTo.value.trim(),
    body: letterBody.value.trim(),
    from: letterFrom.value.trim(),
    theme: currentTheme,
    date: new Date().toISOString().split('T')[0]
  };

  try {
    const res = await fetch(API_BASE + '/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(letter)
    });

    const data = await res.json();
    if (!data.ok || !data.id) {
      throw new Error(data.error || 'Save failed');
    }

    currentToken = data.id;
    currentLetterData = letter;

    const readUrl = window.location.origin + window.location.pathname + '#token/' + currentToken;

    // Generate QR
    qrFrame.innerHTML = '';
    new QRCode(qrFrame, {
      text: readUrl,
      width: 180,
      height: 180,
      colorDark: themes[currentTheme].ink,
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    const recipient = letter.to || '亲爱的朋友';
    qrLabel.textContent = '致 ' + recipient;

    paperEl.style.display = 'none';
    resultSection.classList.add('show');
    btn.style.display = 'none';

    qrDisplay.style.background = themes[currentTheme].card;
    qrDisplay.style.borderColor = themes[currentTheme].border;

    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (err) {
    alert('寄信失败：' + err.message + '\n\n请确认 API_BASE 已配置为你的 Worker 地址');
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = '生成我的信';
  }
});

// ============ COPY LINK ============
document.getElementById('btnCopyLink').addEventListener('click', async () => {
  const url = window.location.origin + window.location.pathname + '#token/' + currentToken;
  try {
    await navigator.clipboard.writeText(url);
    const btn = document.getElementById('btnCopyLink');
    const orig = btn.textContent;
    btn.textContent = '已复制';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  } catch {
    const input = document.createElement('input');
    input.value = url;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    document.body.removeChild(input);
  }
});

// ============ NEW LETTER ============
document.getElementById('btnNewLetter').addEventListener('click', () => {
  letterBody.value = '';
  letterBody.style.height = '';
  letterTo.value = '';
  letterFrom.value = '';
  btnGenerate.disabled = true;
  btnGenerate.classList.remove('loading');
  btnGenerate.textContent = '生成我的信';
  paperEl.style.display = '';
  resultSection.classList.remove('show');
  btnGenerate.style.display = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ============ PRINT OVERLAY ============
function openPrintOverlay() {
  if (!currentToken) return;

  printQr.innerHTML = '';
  const readUrl = window.location.origin + window.location.pathname + '#token/' + currentToken;
  new QRCode(printQr, {
    text: readUrl,
    width: 160,
    height: 160,
    colorDark: '#3d322b',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  const recipient = currentLetterData?.to || '亲爱的朋友';
  printHeader.textContent = '致 ' + recipient;
  printFooter.textContent = readUrl;

  printOverlay.classList.add('show');
}

function closePrintOverlay() {
  printOverlay.classList.remove('show');
}

function doPrint() {
  const actions = printCard.querySelector('.print-actions-overlay');
  const closeBtn = printCard.querySelector('.print-close');
  if (actions) actions.style.display = 'none';
  if (closeBtn) closeBtn.style.display = 'none';

  window.print();

  setTimeout(() => {
    if (actions) actions.style.display = '';
    if (closeBtn) closeBtn.style.display = '';
  }, 100);
}

printOverlay.addEventListener('click', (e) => {
  if (e.target === printOverlay) closePrintOverlay();
});

// ============ READ MODE ============
async function showReadMode(token) {
  writeMode.style.display = 'none';
  errorState.style.display = 'none';
  readMode.style.display = 'block';
  document.querySelector('.app-header').style.display = 'none';

  try {
    const res = await fetch(API_BASE + '/api/read/' + token);
    if (!res.ok) {
      throw new Error('Not found');
    }
    const data = await res.json();

    applyTheme(data.theme || 'warm');

    const lp = document.getElementById('letterPaper');
    lp.style.background = themes[data.theme || 'warm'].card;

    const recipient = data.to || '亲爱的朋友';
    document.getElementById('letterTitle').textContent = '致 ' + recipient;

    // Typewriter effect
    const bodyEl = document.getElementById('letterBodyDisplay');
    bodyEl.innerHTML = '';
    const fullText = data.body || '';
    let charIndex = 0;

    function typeNext() {
      if (charIndex < fullText.length) {
        const char = fullText[charIndex];
        if (char === '\n') {
          bodyEl.appendChild(document.createElement('br'));
        } else {
          bodyEl.appendChild(document.createTextNode(char));
        }
        charIndex++;
        const delay = char === '\n' ? 140 : (char === '，' || char === '。' || char === '…' || char === '！' || char === '？') ? 120 : 40 + Math.random() * 30;
        setTimeout(typeNext, delay);
      } else {
        const cursor = bodyEl.querySelector('.cursor');
        if (cursor) cursor.remove();
        showSignature(data);
      }
    }

    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bodyEl.appendChild(cursor);
    setTimeout(typeNext, 500);

    document.getElementById('letterClose').classList.remove('show');
  } catch (err) {
    readMode.style.display = 'none';
    errorState.style.display = 'block';
    document.querySelector('.app-header').style.display = 'none';
  }
}

function showSignature(data) {
  const close = document.getElementById('letterClose');
  if (data.from) {
    document.getElementById('letterSignature').textContent = '—— ' + data.from;
  } else {
    document.getElementById('letterSignature').textContent = '';
  }
  document.getElementById('letterDate').textContent = data.date || '';
  close.classList.add('show');
}

// ============ ROUTER ============
function route() {
  const hash = window.location.hash;

  if (!hash) {
    writeMode.style.display = 'block';
    readMode.style.display = 'none';
    errorState.style.display = 'none';
    document.querySelector('.app-header').style.display = '';
    return;
  }

  if (hash.startsWith('#token/')) {
    const token = hash.slice(7);
    if (token.length >= 4) {
      showReadMode(token);
      return;
    }
  }

  location.hash = '';
}

window.addEventListener('hashchange', route);
route();
</script>
