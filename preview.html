<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计资产预览 — 寄信 AI 视觉身份</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0ebe3;
    color: #2a2419;
    padding: 40px 20px;
    line-height: 1.6;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ============ 页头 ============ */
  .page-header {
    text-align: center;
    margin-bottom: 60px;
    padding-bottom: 30px;
    border-bottom: 2px solid #d6cdb8;
  }
  .page-header h1 {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 42px;
    color: #2a2419;
    letter-spacing: 6px;
    margin-bottom: 12px;
  }
  .page-header .sub {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: #6a5d4f;
    letter-spacing: 2px;
  }
  .page-header .stats {
    margin-top: 20px;
    font-size: 13px;
    color: #8a7a6b;
  }
  .page-header .stats strong {
    color: #c44536;
    font-weight: 600;
  }

  /* ============ 章节标题 ============ */
  .section {
    margin-bottom: 80px;
  }
  .section-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 28px;
    color: #2a2419;
    letter-spacing: 4px;
    margin-bottom: 8px;
    padding-left: 16px;
    border-left: 4px solid #c44536;
  }
  .section-desc {
    font-size: 13px;
    color: #6a5d4f;
    margin-bottom: 30px;
    padding-left: 20px;
    letter-spacing: 0.5px;
  }

  /* ============ 配色盘网格 ============ */
  .palette-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }

  .palette-card {
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    background: #fff;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .palette-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  }

  /* 预览区:模拟信纸 */
  .palette-preview {
    padding: 28px 24px 24px;
    position: relative;
    min-height: 200px;
  }
  .palette-preview::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
  }
  .palette-preview .preview-meta {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.7;
  }
  .palette-preview .preview-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 20px;
    letter-spacing: 3px;
    margin-bottom: 16px;
  }
  .palette-preview .preview-body {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    line-height: 1.9;
    margin-bottom: 16px;
  }
  .palette-preview .preview-sig {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 13px;
    text-align: right;
    padding-top: 12px;
    border-top: 1px dashed currentColor;
    opacity: 0.8;
  }
  .palette-preview .preview-btn {
    display: inline-block;
    padding: 6px 16px;
    font-size: 11px;
    letter-spacing: 1px;
    border-radius: 2px;
    margin-top: 8px;
  }

  /* 信息区 */
  .palette-info {
    padding: 16px 20px;
    background: #faf8f3;
    border-top: 1px solid #ede8df;
  }
  .palette-info .name {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 17px;
    color: #2a2419;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .palette-info .mood {
    font-size: 12px;
    color: #8a7a6b;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .palette-info .swatches {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .palette-info .swatch {
    flex: 1;
    height: 24px;
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }
  .palette-info .swatch::after {
    content: attr(data-color);
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: #8a7a6b;
    font-family: monospace;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .palette-info .swatch:hover::after {
    opacity: 1;
  }
  .palette-info .swatch-labels {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .palette-info .swatch-label {
    flex: 1;
    font-size: 9px;
    color: #a09080;
    text-align: center;
    letter-spacing: 0.3px;
  }

  /* ============ 装饰展示 ============ */
  .deco-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 24px;
  }
  .deco-card {
    background: #fffef9;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    border-top: 4px solid #c44536;
  }
  .deco-preview {
    position: relative;
    min-height: 240px;
    padding: 32px 28px;
    background: #fffef9;
    overflow: hidden;
  }
  .deco-preview .deco-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 22px;
    color: #3d322b;
    letter-spacing: 3px;
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
  }
  .deco-preview .deco-body {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    line-height: 2;
    color: #3d322b;
    position: relative;
    z-index: 2;
  }
  .deco-info {
    padding: 14px 20px;
    background: #faf8f3;
    border-top: 1px solid #ede8df;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .deco-info .deco-name {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 16px;
    color: #2a2419;
    letter-spacing: 2px;
  }
  .deco-info .deco-mood {
    font-size: 11px;
    color: #8a7a6b;
    letter-spacing: 0.5px;
  }

  /* ============ 字体展示 ============ */
  .font-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
    gap: 24px;
  }
  .font-card {
    background: #fffef9;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    border-top: 4px solid #b8956a;
    padding: 32px 28px;
  }
  .font-card .font-label {
    font-size: 11px;
    color: #8a7a6b;
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .font-card .font-name {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 18px;
    color: #2a2419;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .font-card .font-mood {
    font-size: 12px;
    color: #8a7a6b;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px dashed #e0d5c7;
  }
  .font-card .font-sample-title {
    margin-bottom: 16px;
    letter-spacing: 4px;
  }
  .font-card .font-sample-body {
    font-size: 15px;
    line-height: 2;
    color: #3d322b;
  }
  .font-card .font-stack {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #e0d5c7;
    font-size: 10px;
    color: #a09080;
    font-family: monospace;
    line-height: 1.6;
    word-break: break-all;
  }

  /* ============ 组合展示 ============ */
  .combo-section {
    background: #fffef9;
    border-radius: 4px;
    padding: 40px 32px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    border-top: 4px solid #c44536;
  }
  .combo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    margin-top: 24px;
  }
  .combo-card {
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    min-height: 280px;
    padding: 28px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .combo-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
  }
  .combo-card .combo-meta {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.7;
  }
  .combo-card .combo-title {
    font-size: 20px;
    letter-spacing: 3px;
    margin-bottom: 16px;
    position: relative;
    z-index: 2;
  }
  .combo-card .combo-body {
    font-size: 13px;
    line-height: 1.9;
    margin-bottom: 16px;
    position: relative;
    z-index: 2;
  }
  .combo-card .combo-sig {
    font-size: 12px;
    text-align: right;
    padding-top: 12px;
    border-top: 1px dashed currentColor;
    opacity: 0.8;
    position: relative;
    z-index: 2;
  }
  .combo-card .combo-tag {
    position: absolute;
    bottom: 12px;
    left: 24px;
    font-size: 10px;
    letter-spacing: 1px;
    opacity: 0.6;
    z-index: 2;
  }

  /* ============ 响应式 ============ */
  @media (max-width: 768px) {
    body { padding: 20px 12px; }
    .page-header h1 { font-size: 30px; letter-spacing: 4px; }
    .palette-grid, .deco-grid, .font-grid, .combo-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="container">

  <!-- ============ 页头 ============ -->
  <div class="page-header">
    <h1>设计资产预览</h1>
    <div class="sub">寄信 · AI 视觉身份系统</div>
    <div class="stats">
      <strong>15</strong> 套配色盘 × <strong>7</strong> 种装饰 × <strong>4</strong> 种字体 = <strong>420</strong> 种组合
    </div>
  </div>

  <!-- ============ 第一部分:15 套配色盘 ============ -->
  <div class="section">
    <div class="section-title">一、15 套配色盘</div>
    <div class="section-desc">每套 6 个 CSS 变量,直接对应 :root 体系。前 4 套复用现有主题,后 11 套为新设计。鼠标悬停色块可查看色值。</div>
    <div class="palette-grid" id="paletteGrid"></div>
  </div>

  <!-- ============ 第二部分:7 种装饰 ============ -->
  <div class="section">
    <div class="section-title">二、7 种装饰</div>
    <div class="section-desc">所有装饰用 currentColor 取色,跟随主题变化。透明度 0.1-0.15,不干扰阅读。</div>
    <div class="deco-grid" id="decoGrid"></div>
  </div>

  <!-- ============ 第三部分:4 种字体搭配 ============ -->
  <div class="section">
    <div class="section-title">三、4 种字体搭配</div>
    <div class="section-desc">复用现有 Google Fonts 加载,零性能成本。通过字重和字体栈切换气质。</div>
    <div class="font-grid" id="fontGrid"></div>
  </div>

  <!-- ============ 第四部分:组合效果预览 ============ -->
  <div class="section">
    <div class="section-title">四、组合效果预览</div>
    <div class="section-desc">展示 6 个典型组合,模拟真实读信场景。这就是 AI 为不同情绪信件匹配出的最终效果。</div>
    <div class="combo-section">
      <div class="combo-grid" id="comboGrid"></div>
    </div>
  </div>

</div>

// ============ 渲染配色盘 ============
function renderPalettes() {
  const grid = document.getElementById('paletteGrid');
  palettes.forEach(p => {
    const c = p.colors;
    const isDark = p.dark;
    const card = document.createElement('div');
    card.className = 'palette-card';
    card.innerHTML = `
      <div class="palette-preview" style="background:${c.card};color:${c.ink};">
        <div style="position:absolute;top:0;left:0;right:0;height:4px;background:${c.accent};"></div>
        <div class="preview-meta" style="color:${c.ink};">A LETTER FOR YOU</div>
        <div class="preview-title">致 朋友</div>
        <div class="preview-body">这是一封写给你的信。文字会慢慢展开，像有人正念给你听。</div>
        <div class="preview-sig">—— 寄信人</div>
        <div class="preview-btn" style="background:${c.ink};color:${c.card};">阅读这封信</div>
      </div>
      <div class="palette-info">
        <div class="name">${p.id}. ${p.name}${isDark ? ' · 深色' : ''}</div>
        <div class="mood">${p.mood}</div>
        <div class="swatches">
          <div class="swatch" style="background:${c.card};border:1px solid #ddd;" data-color="${c.card}"></div>
          <div class="swatch" style="background:${c.bg};" data-color="${c.bg}"></div>
          <div class="swatch" style="background:${c.accent};" data-color="${c.accent}"></div>
          <div class="swatch" style="background:${c.ink};" data-color="${c.ink}"></div>
          <div class="swatch" style="background:${c.border};" data-color="${c.border}"></div>
          <div class="swatch" style="background:${c.gold};" data-color="${c.gold}"></div>
        </div>
        <div class="swatch-labels">
          <div class="swatch-label">card</div>
          <div class="swatch-label">bg</div>
          <div class="swatch-label">accent</div>
          <div class="swatch-label">ink</div>
          <div class="swatch-label">border</div>
          <div class="swatch-label">gold</div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

    card.innerHTML = `
      <div class="font-label">FONT PAIR · ${f.id}</div>

      <div class="font-mood">${f.mood}</div>

      <div class="font-stack">${f.stack}</div>
    `;
    grid.appendChild(card);
  });
}

// ============ 渲染组合 ============
function renderCombos() {
  const grid = document.getElementById('comboGrid');
  combos.forEach(combo => {
    const p = palettes.find(x => x.id === combo.paletteId);
    const f = fontPairs.find(x => x.id === combo.font);
    const d = decorations[combo.deco];
    const c = p.colors;
    const card = document.createElement('div');
    card.className = 'combo-card';
    card.style.background = c.card;
    card.style.color = c.ink;
    card.style.borderColor = c.accent;
    card.innerHTML = `
      <div style="position:absolute;top:0;left:0;right:0;height:4px;background:${c.accent};"></div>
      ${d.svg.replace(/color:[^;]+;/, `color:${c.accent};`)}
      <div class="combo-meta" style="color:${c.ink};">AI 读懂了:${combo.mood}</div>
      <div class="combo-title" style="font-family:${f.titleFont};font-weight:${f.titleWeight};color:${c.ink};">致 朋友</div>
      <div class="combo-body" style="font-family:${f.bodyFont};font-weight:${f.bodyWeight};color:${c.ink};white-space:pre-line;">${combo.sample}</div>
      <div class="combo-sig" style="color:${c.ink};">${combo.sig}</div>
      <div class="combo-tag" style="color:${c.ink};">${combo.tag}</div>
    `;
    grid.appendChild(card);
  });
}
